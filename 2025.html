<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projeto2025</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/openseadragon/4.1.0/openseadragon.min.js"></script>
    <style>
        html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        }
        #viewer {
        width: 100%;
        height: 100%;
        background: #000;
        }
        /* CORREÇÃO DOS BOTÕES */
        .openseadragon-container .openseadragon-button img {
            width: 28px !important;
            height: 28px !important;
        }

        .openseadragon-container .openseadragon-button {
            width: 28px !important;
            height: 28px !important;
        }

        /* opcional: deixa menor ainda em telas grandes */
        @media (min-width: 1200px) {
            .openseadragon-container .openseadragon-button {
                transform: scale(0.8);
                transform-origin: top right;
            }
        }
    </style>
    </style>
</head>
<body>

<div id="viewer"></div>

<script>
  var viewer = OpenSeadragon({
  id: "viewer",
  prefixUrl: "https://cdnjs.cloudflare.com/ajax/libs/openseadragon/4.1.0/images/",
  tileSources: "imagens/DDART25/ddart25.dzi",

  //melhora posicionamento dos botões
    showNavigationControl: true,
    navigationControlAnchor: OpenSeadragon.ControlAnchor.TOP_RIGHT
});

viewer.addHandler("open", function(){

    var gif = document.createElement("img");
    gif.src = "imagensAlt/obama-prism.gif";
    gif.style.width = "100%";

    viewer.addOverlay({
        element: gif,
        location: viewer.viewport.imageToViewportRectangle(5220, 9670, 150, 150)
    });

});
</script>
</body>
</html>
